[workspace]
authors = ["itsdevcoffee <itstexmex@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-audio"
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version = "0.2.0"
description = "High-performance audio DSP library in Mojo - beats Python!"

[tasks]
# Testing
test-window = "mojo -I src tests/test_window.mojo"
test-fft = "mojo -I src tests/test_fft.mojo"
test-mel = "mojo -I src tests/test_mel.mojo"
test-wav = "mojo -I src tests/test_wav_io.mojo"
test-resample = "mojo -I src tests/test_resample.mojo"
test-vad = "mojo -I src tests/test_vad.mojo"
test-istft = "mojo -I src tests/test_istft.mojo"
test-pitch = "mojo -I src tests/test_pitch.mojo"
test = """
    mojo -I src tests/test_window.mojo &&
    mojo -I src tests/test_fft.mojo &&
    mojo -I src tests/test_mel.mojo &&
    mojo -I src tests/test_wav_io.mojo &&
    mojo -I src tests/test_resample.mojo &&
    mojo -I src tests/test_vad.mojo &&
    mojo -I src tests/test_istft.mojo &&
    mojo -I src tests/test_pitch.mojo
"""

# Examples
demo-window = "mojo -I src examples/window_demo.mojo"
demo-fft = "mojo -I src examples/fft_demo.mojo"
demo-mel = "mojo -I src examples/mel_demo.mojo"
demo = "mojo -I src examples/mel_demo.mojo"

# Benchmarks
bench = "mojo -I src benchmarks/bench_mel_spectrogram.mojo"
bench-optimized = "mojo -O3 -I src benchmarks/bench_mel_spectrogram.mojo"
bench-python = "python benchmarks/compare_librosa.py"
test-models = "pytest tests/test_audio_encoder.py -v -m 'not slow'"
test-models-full = "pytest tests/test_audio_encoder.py -v -s"
test-pitch-extractor = "pytest tests/test_pitch_extractor.py -v -m 'not slow'"
test-pitch-extractor-full = "pytest tests/test_pitch_extractor.py -v -s"
bench-models = "python experiments/contentvec-max/benchmark.py"

# Development
repl = "mojo"

# UI
ui = "cd ui/backend && python app.py"
dev = "cd web && npm install --silent && npm run dev & cd ui/backend && python app.py & wait"

# FFI - Build shared library for C/Rust/Python integration
build-ffi = "mojo build --emit shared-lib -I src -o libmojo_audio.so src/ffi/audio_ffi.mojo"
build-ffi-optimized = "mojo build --emit shared-lib -O3 -I src -o libmojo_audio.so src/ffi/audio_ffi.mojo"
install-ffi = """
    mkdir -p $HOME/.local/lib &&
    cp libmojo_audio.so $HOME/.local/lib/ &&
    mkdir -p $HOME/.local/include &&
    cp include/mojo_audio.h $HOME/.local/include/ &&
    echo 'FFI library installed to ~/.local/lib and ~/.local/include'
"""
clean-ffi = "rm -f libmojo_audio.so libmojo_audio.dylib"

# Platform-specific FFI builds
[target.osx.tasks]
build-ffi = "mojo build --emit shared-lib -I src -o libmojo_audio.dylib src/ffi/audio_ffi.mojo"
build-ffi-optimized = "mojo build --emit shared-lib -O3 -I src -o libmojo_audio.dylib src/ffi/audio_ffi.mojo"
install-ffi = """
    mkdir -p $HOME/.local/lib &&
    cp libmojo_audio.dylib $HOME/.local/lib/ &&
    mkdir -p $HOME/.local/include &&
    cp include/mojo_audio.h $HOME/.local/include/ &&
    echo 'FFI library installed to ~/.local/lib and ~/.local/include'
"""

[dependencies]
max = "==26.3.0.dev2026032005"
mojo = "==0.26.3.0.dev2026032005"
matplotlib = ">=3.10.8,<4"
scipy = ">=1.16.3,<2"
librosa = ">=0.11.0,<0.12"
numba = ">=0.63.1,<0.64"
fastapi = ">=0.115.3"
uvicorn = ">=0.27.0"
pydantic = ">=2.5.3"
python-multipart = ">=0.0.6"
onnx = ">=1.16.0,<2"
onnxruntime = ">=1.20.0,<2"
transformers = ">=4.45.0,<5"
huggingface_hub = ">=0.25.0,<1.0"
pytest = ">=8.0.0,<9"
safetensors = ">=0.4.0,<1"

[activation]
# Prevent user site-packages (~/.local/lib/python3.13/) from leaking into pixi env.
# Needed because pixi uses Python 3.13 but system user site has huggingface_hub==1.2.3
# which conflicts with transformers' requirement of huggingface-hub<1.0.
env = { PYTHONNOUSERSITE = "1" }

[target.linux-64.pypi-dependencies]
# PyTorch with CUDA 12.8 — linux-64 only (no macOS CUDA wheels exist).
torch = { version = ">=2.5.0,<3", index = "https://download.pytorch.org/whl/cu128" }

[target.linux-aarch64.pypi-dependencies]
# PyTorch for ARM64 (DGX Spark / Grace Blackwell) — standard PyPI wheel includes CUDA.
torch = ">=2.5.0,<3"

# BLAS backend features - allows switching between MKL and OpenBLAS
# Note: MKL is Linux-only, macOS uses OpenBLAS automatically
[feature.mkl.target.linux-64.dependencies]
libblas = { version = "*", build = "*mkl" }

[feature.openblas.dependencies]
libblas = { version = "*", build = "*openblas" }

[environments]
default = { features = ["openblas"], solve-group = "default" }
mkl = { features = ["mkl"], solve-group = "mkl" }
openblas = { features = ["openblas"], solve-group = "default" }
